<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <script>
    setTimeout(function() {
      window.location.href = "https://polopolomi.com";
    }, 1000); // 1000ms = 1 second
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #1966ca);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #fff;
      color: #333;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f1f1f1;
    }

    .loader {
      margin: 20px auto;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Redirecting...</h1>
    <p>Please wait while we take you to the page.</p>

    <div class="loader"></div>

    <a href="https://polopolomi.com" class="btn">
      Click here if not redirected
    </a>
  </div>
</body>
</html>
